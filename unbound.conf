# unbound.conf — openSUSE Tumbleweed
# Corrections appliquées le 22/03/2026 (Accès Bbox rétabli)
# VMs libvirt + hôte → Quad9 DoT

server:

    # ─── VERBOSITÉ ───────────────────────────────────────────────
    verbosity: 1

    # ─── STATISTIQUES (Munin / unbound-control stats) ────────────
    statistics-interval: 3600
    statistics-cumulative: yes
    extended-statistics: yes
    statistics-inhibit-zero: yes

    # ─── THREADS ─────────────────────────────────────────────────
    num-threads: 4

    # ─── INTERFACES D'ÉCOUTE ─────────────────────────────────────
    interface: 127.0.0.1
    interface: ::1
    interface: YOUR_BRIDGE_INTERFACE  # e.g. br0 for KVM bridge
    interface-automatic: no
    port: 53
    interface: 127.0.0.1@8053
    interface: ::1@8053

    # ─── MODULES DE TRAITEMENT ──────────────────────────────────
    module-config: "validator iterator"
    https-port: 8053
    http-endpoint: "/dns-query"
    http-notls-downstream: yes

    # Cipher suites
    tls-ciphers: "PROFILE=SYSTEM"
    tls-ciphersuites: "TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256:TLS_CHACHA20_POLY1305_SHA256"

    # ─── CERTIFICATS TLS UPSTREAM ────────────────────────────────
    tls-cert-bundle: "/etc/ssl/ca-bundle.pem"

    # ─── PORTS SORTANTS ──────────────────────────────────────────
    # outgoing-range: 4096
    outgoing-range: 1024

    # ─── BUFFERS UDP/TCP ─────────────────────────────────────────
    so-rcvbuf: 8m
    so-sndbuf: 8m
    so-reuseport: yes
    max-udp-size: 3072
    msg-buffer-size: 65552

    # ─── OPTIMISATION CADDYFILE ──────────────────────────────────
    http-max-streams: 100
    http-query-buffer-size: 4m
    http-response-buffer-size: 4m

    # ─── CACHES ──────────────────────────────────────────────────
    msg-cache-size: 50m
    msg-cache-slabs: 8
    rrset-cache-size: 100m
    rrset-cache-slabs: 8
    key-cache-size: 16m
    key-cache-slabs: 8
    infra-cache-slabs: 8
    infra-cache-numhosts: 10000

    # ─── TTL ─────────────────────────────────────────────────────
    cache-min-ttl: 300
    cache-max-ttl: 86400
    # Réduit le cache négatif (NXDOMAIN) — défaut 3600 trop élevé pour les listes de blocage
    cache-max-negative-ttl: 60
    num-queries-per-thread: 4096

    # ─── PROTOCOLES ──────────────────────────────────────────────
    do-ip4: yes
    do-ip6: yes
    do-udp: yes
    do-tcp: yes

    # ─── CONTRÔLE D'ACCÈS ────────────────────────────────────────
    access-control: 127.0.0.1/32 allow
    access-control: ::1 allow
    access-control: YOUR_LAN_SUBNET  # e.g. 192.168.1.0/24 allow
    access-control: 0.0.0.0/0 refuse
    # Refus explicite IPv6 (évite de dépendre du défaut compilateur)
    access-control: YOUR_LAN_IPV6_PREFIX/64 allow  # e.g. 2001:db8::/64 — KVM guests on bridge
    access-control: ::/0 refuse

    # ─── CHEMINS SYSTÈME ─────────────────────────────────────────
    chroot: ""
    username: "unbound"
    directory: "/etc/unbound"
    pidfile: "/var/run/unbound/unbound.pid"
    # Signale à systemd quand unbound est réellement prêt (socket bound)
    use-systemd: yes

    # ─── LOGS ────────────────────────────────────────────────────
    use-syslog: no
    logfile: "/var/log/unbound.log"
    log-time-ascii: yes
    log-queries: yes      # Log chaque requête DNS individuelle
    log-replies: yes      # Log chaque réponse DNS
    log-servfail: yes     # Log les échecs SERVFAIL — détection de problèmes
    log-tag-queryreply: yes  # Ajoute un tag query/reply pour filtrage Loki
    log-local-actions: yes
    # ─── ROOT HINTS ──────────────────────────────────────────────
    root-hints: "/etc/unbound/root.hints"

    # ─── CONFIDENTIALITÉ DNS ─────────────────────────────────────
    qname-minimisation: yes
    qname-minimisation-strict: yes
    hide-identity: yes
    hide-version: yes
    identity: "DNS"

    # ─── SÉCURITÉ / DURCISSEMENT ─────────────────────────────────
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-below-nxdomain: yes
    harden-referral-path: yes
    harden-algo-downgrade: yes
    harden-large-queries: yes
    harden-short-bufsize: yes
    use-caps-for-id: yes
    aggressive-nsec: yes
    unwanted-reply-threshold: 10000
    do-not-query-localhost: yes
    # Refuse les requêtes de type ANY (utilisées pour l'amplification DNS)
    deny-any: yes

    # --- AJOUTS SPECIFIQUES BBOX ---
    # Protection DNS rebinding — plages RFC1918 complètes
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: fe80::/10
    private-address: fd00::/8
    # Autorise les réponses IP privées pour ces domaines locaux
    private-domain: "bytel.fr."
    private-domain: "home."
    # Désactive DNSSEC pour ces domaines (car la box ne signe pas ses réponses)
    domain-insecure: "bytel.fr."
    domain-insecure: "home."
    # -------------------------------

    ratelimit: 1000
    # Limite par IP source — protège br0 exposé aux VMs
    ip-ratelimit: 200
    ip-ratelimit-size: 4m
    delay-close: 10000

    # ─── PERFORMANCE ─────────────────────────────────────────────
    prefetch: yes
    prefetch-key: yes
    rrset-roundrobin: yes
    minimal-responses: yes
    serve-expired: yes
    serve-expired-ttl: 3600
    # Maintient les connexions TCP/TLS ouvertes pour DoT vers Quad9 (évite re-négociation TLS)
    edns-tcp-keepalive: yes

    # ─── DNSSEC ──────────────────────────────────────────────────
    trusted-keys-file: /etc/unbound/keys.d/*.key
    auto-trust-anchor-file: "/var/lib/unbound/root.key"
    val-clean-additional: yes
    val-permissive-mode: no
    val-log-level: 1
    # TTL des réponses DNSSEC invalides (explicite, défaut = 60s)
    val-bogus-ttl: 60

    # ─── INCLUSIONS ──────────────────────────────────────────────
    #include: "/etc/unbound/local.d/unbound_add_servers.conf"
    include: /etc/unbound/local.d/doh-local.conf
    # include: /etc/unbound/local.d/*.conf
    # include: /etc/unbound/conf.d/*.conf
    include: /etc/unbound/local.d/unbound_add_servers.conf
# ─────────────────────────────────────────────────────────────────
# CONTRÔLE À DISTANCE
# ─────────────────────────────────────────────────────────────────
remote-control:
    control-enable: yes
    server-key-file:  "/etc/unbound/unbound_server.key"
    server-cert-file: "/etc/unbound/unbound_server.pem"
    control-key-file: "/etc/unbound/unbound_control.key"
    control-cert-file: "/etc/unbound/unbound_control.pem"

# ─────────────────────────────────────────────────────────────────
# FORWARD ZONE — DNS-over-TLS vers Quad9
# ─────────────────────────────────────────────────────────────────
forward-zone:
    name: "bytel.fr."
    forward-addr: YOUR_GATEWAY_IP  # e.g. 192.168.1.254

forward-zone:
    name: "home."
    forward-addr: YOUR_GATEWAY_IP  # e.g. 192.168.1.254

forward-zone:
    name: "."
    forward-tls-upstream: yes
    forward-addr: 9.9.9.9@853#dns.quad9.net
    forward-addr: 149.112.112.112@853#dns.quad9.net
    forward-addr: 2620:fe::fe@853#dns.quad9.net
    forward-addr: 2620:fe::9@853#dns.quad9.net
    forward-first: no
