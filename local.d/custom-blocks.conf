# custom-blocks.conf — Blocages manuels (séparé de la liste OISD Full)
# Domaines absents de OISD ou nécessitant un blocage ciblé sur sous-domaine
# Format : redirect + local-data A 127.0.0.1 (loopback — ECONNREFUSED immédiat)
# Ne pas modifier unbound_add_servers.conf directement — ce fichier survit aux mises à jour

    # Note: unityads.unity3d.com est couvert par OISD Full — pas besoin de l'ajouter ici

    # --- Absents de OISD Full ---

    # Cookiebot (Cybot/Usercentrics) — bannières GDPR tracking
    local-zone: "cookiebot.com" redirect
    local-data: "cookiebot.com A 127.0.0.1"

    # Branch.io — tracking de liens profonds
    local-zone: "bnc.lt" redirect
    local-data: "bnc.lt A 127.0.0.1"

    # Kochava — attribution pub mobile
    local-zone: "kochava.com" redirect
    local-data: "kochava.com A 127.0.0.1"

    # CleverTap — analytics/push
    local-zone: "clevertap-prod.com" redirect
    local-data: "clevertap-prod.com A 127.0.0.1"

    # Greatis — PUP/adware
    local-zone: "greatis.com" redirect
    local-data: "greatis.com A 127.0.0.1"

    # OneTrust — consent tracking CDN
    local-zone: "cookielaw.org" redirect
    local-data: "cookielaw.org A 127.0.0.1"

    # Privacy management tracking
    local-zone: "privacy-mgmt.com" redirect
    local-data: "privacy-mgmt.com A 127.0.0.1"

    # Zenaps — analytics
    local-zone: "zenaps.com" redirect
    local-data: "zenaps.com A 127.0.0.1"

    # PartnerStack — tracking affiliation
    local-zone: "partnerstack.com" redirect
    local-data: "partnerstack.com A 127.0.0.1"

    # --- Sous-domaines ciblés (domaine parent légitime, non bloqué) ---

    # YouTube tracking (pas youtube.com)
    local-zone: "s.youtube.com" redirect
    local-data: "s.youtube.com A 127.0.0.1"

    # Apple télémétrie (pas apple.com)
    local-zone: "xp.apple.com" redirect
    local-data: "xp.apple.com A 127.0.0.1"

    # LG télémétrie (pas lge.com)
    local-zone: "ngfts.lge.com" redirect
    local-data: "ngfts.lge.com A 127.0.0.1"
