# zzz-overrides.conf — chargé en dernier (z > u, après unbound_add_servers.conf/OISD)
# Permet de surcharger des entrées OISD pour des domaines légitimes.

# Google admin UI — premier-party uniquement
# analytics.google.com = Search Console / Analytics UI (PAS www.google-analytics.com)
# tagmanager.google.com = Tag Manager UI (PAS googletagmanager.com)
# search.google.com = Search Console
local-zone: "analytics.google.com." transparent
